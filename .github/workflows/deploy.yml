name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: https://adsvendas-b.adsapi.com.br
      VITE_BASE_PATH: /
      FRONTEND_PORT: 8081
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing SSH_PRIVATE_KEY secret"
            exit 1
          fi
          if [ -z "${SSH_HOST:-}" ]; then
            echo "Missing SSH_HOST secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Preflight SSH check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" 'echo ok'

      - name: Copy project to VPS (rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22}" \
            ./ "${SSH_USER}@${SSH_HOST}:${TARGET_DIR}/"

      - name: Upload deploy env file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          {
            printf 'VITE_API_BASE=%s\n' "$VITE_API_BASE"
            printf 'VITE_BASE_PATH=%s\n' "$VITE_BASE_PATH"
            printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT"
          } > .env.deploy
          scp -i ~/.ssh/id_deploy -P "${SSH_PORT:-22}" .env.deploy "${SSH_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          rm -f .env.deploy

      - name: Deploy on VPS (Docker Compose up)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" \
            DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
            'bash -se' <<'EOF'
          set -euo pipefail

          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi

          cd "$DEPLOY_DIR"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif docker-compose --version >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose not found on VPS."
            exit 1
          fi

          $COMPOSE -f docker-compose.prod.yml up -d --build --remove-orphans
          EOF
