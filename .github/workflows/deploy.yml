name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'nginx.conf'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '8081' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SSH password helper (if needed)
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          wait_apt_locks() {
            local timeout_seconds="${1:-600}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on GitHub runner."
                return 1
              fi
              echo "Apt lock detected on runner, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          if [ -n "${SSH_PASSWORD:-}" ]; then
            wait_apt_locks 600
            sudo apt-get update -y
            wait_apt_locks 600
            sudo apt-get install -y sshpass
          fi

      - name: Setup SSH authentication
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_HOST:-}" ]; then
            echo "Missing SSH_HOST secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy
            {
              echo "SSH_AUTH_MODE=key"
              echo "SSH_BASE_ARGS=-i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-i ~/.ssh/id_deploy -P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          elif [ -n "${SSH_PASSWORD:-}" ]; then
            {
              echo "SSH_AUTH_MODE=password"
              echo "SSHPASS=${SSH_PASSWORD}"
              echo "SSH_BASE_ARGS=-p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          else
            echo "Missing SSH auth secret. Set SSH_PRIVATE_KEY or SSH_PASSWORD."
            exit 1
          fi

      - name: Preflight SSH check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          fi

      - name: Bootstrap VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          REMOTE_SCRIPT=$(cat <<'EOF'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          wait_apt_locks() {
            local timeout_seconds="${1:-900}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on VPS."
                return 1
              fi
              echo "Apt lock detected on VPS, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          apt_safe() {
            wait_apt_locks 900
            apt-get "$@" -o Dpkg::Lock::Timeout=900
          }

          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi
          if [ "$(id -u)" = "0" ] && command -v apt-get >/dev/null 2>&1; then
            apt_safe update -y
            apt_safe install -y ca-certificates curl git rsync ufw
          fi
          if ! docker compose version >/dev/null 2>&1; then
            install -m 0755 -d /etc/apt/keyrings
            if [ ! -f /etc/apt/keyrings/docker.asc ]; then
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
            fi
            ARCH="$(dpkg --print-architecture)"
            CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
            cat >/etc/apt/sources.list.d/docker.list <<SRC
          deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${CODENAME} stable
          SRC
            apt_safe update -y
            apt_safe install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            systemctl enable --now docker
          fi
          mkdir -p "$DEPLOY_DIR"
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          fi

      - name: Sync files to VPS (rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          # Sync dist/ (built in CI) + config files. No build on the server.
          # Use --exclude=PATTERN form to avoid quoting issues with variable expansion.
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            sshpass -e rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          fi

      - name: Upload .env file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT" > .env.deploy
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          else
            sshpass -e scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          fi
          rm -f .env.deploy

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL || 'https://adsvendas-f.adsapi.com.br' }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          # heredoc com aspas evita interpolacao do runner; tudo abaixo roda no servidor
          REMOTE_SCRIPT=$(cat <<'REMOTE_EOF'
          set -uo pipefail

          : "${DEPLOY_DIR:=~/apps/televendas-pro-suite}"
          : "${PUBLIC_URL:=https://adsvendas-f.adsapi.com.br}"
          if [[ "$DEPLOY_DIR" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi
          cd "$DEPLOY_DIR"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif docker-compose --version >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose not found on VPS."; exit 1
          fi

          # 1) Bundle atual
          NEW_BUNDLE=$(ls "$DEPLOY_DIR/dist/assets/"index-*.js 2>/dev/null | head -1 | xargs -r basename)
          [ -n "$NEW_BUNDLE" ] || { echo "ERRO: bundle nao encontrado em dist/assets/"; exit 1; }
          echo ">>> Bundle desta versao: $NEW_BUNDLE"

          # 2) Atualizar webroot do nginx do sistema
          NGINX_WEBROOT="/var/www/adsvendas/frontend"
          if [ -d "$NGINX_WEBROOT" ] && [ -w "$NGINX_WEBROOT" ]; then
            echo ">>> Sincronizando $NGINX_WEBROOT ..."
            rsync -a --checksum --delete "$DEPLOY_DIR/dist/." "$NGINX_WEBROOT/"
            echo "    index.html agora aponta para: $(grep -oE 'src="/assets/index-[^"]+\.js"' "$NGINX_WEBROOT/index.html" | head -1)"
          else
            echo ">>> AVISO: $NGINX_WEBROOT nao acessivel para escrita"
          fi

          # 3) Recriar Docker container (porta 8081)
          docker pull nginx:1.27-alpine >/dev/null
          $COMPOSE -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
          docker exec tecdisa-frontend nginx -s reload 2>/dev/null || true

          # 4) Reload do nginx do sistema (limpa open_file_cache / proxy_cache)
          echo ">>> Tentando reload do nginx do sistema..."
          RELOAD_OK=0
          if sudo -n nginx -s reload 2>/dev/null; then
            echo "    sudo nginx -s reload: OK"; RELOAD_OK=1
          elif sudo -n systemctl reload nginx 2>/dev/null; then
            echo "    sudo systemctl reload nginx: OK"; RELOAD_OK=1
          elif sudo -n service nginx reload 2>/dev/null; then
            echo "    sudo service nginx reload: OK"; RELOAD_OK=1
          else
            # Tenta SIGHUP no master (so funciona se o nginx for nosso ou processo do mesmo user)
            for PID in $(pgrep -f 'nginx: master process' 2>/dev/null); do
              if kill -HUP "$PID" 2>/dev/null; then
                echo "    SIGHUP enviado para nginx master $PID: OK"; RELOAD_OK=1; break
              fi
            done
          fi

          # 5) Verificar resultado externamente
          echo ">>> Verificando $PUBLIC_URL ..."
          sleep 2
          REMOTE_HTML=$(curl -fsSL --max-time 15 "$PUBLIC_URL/" 2>/dev/null || true)
          REMOTE_BUNDLE=$(echo "$REMOTE_HTML" | grep -oE 'src="/assets/index-[^"]+\.js"' | head -1)
          echo "    URL publica serve: $REMOTE_BUNDLE"
          echo "    Esperado:          src=\"/assets/$NEW_BUNDLE\""

          if echo "$REMOTE_BUNDLE" | grep -q "$NEW_BUNDLE"; then
            echo ">>> OK! Site publico atualizado."
            exit 0
          fi

          # Nao funcionou - imprimir guia de correcao
          echo ""
          echo "============================================================="
          echo "FALHA: o site publico ainda serve versao antiga."
          echo "============================================================="
          if [ "$RELOAD_OK" = "0" ]; then
            echo ""
            echo "CAUSA: o nginx do sistema nao foi recarregado e mantem cache."
            echo ""
            echo "CORRECAO PERMANENTE (rode UMA VEZ no servidor como root):"
            echo "  echo '$(whoami) ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl reload nginx, /usr/bin/systemctl reload nginx' | sudo tee /etc/sudoers.d/deploy-nginx"
            echo "  sudo chmod 0440 /etc/sudoers.d/deploy-nginx"
            echo ""
            echo "Depois disso, o proximo deploy (git push) ja funciona sozinho."
            echo ""
            echo "CORRECAO IMEDIATA (so para este deploy, rode como root):"
            echo "  sudo nginx -s reload"
          else
            echo ""
            echo "Nginx do sistema FOI recarregado mas o site ainda nao atualizou."
            echo "Investigar: pode haver proxy_cache configurado em outro caminho,"
            echo "ou o webroot real do nginx eh diferente de $NGINX_WEBROOT."
            echo ""
            echo "Procure no servidor por outros index.html:"
            echo "  sudo find / -name 'index.html' -size 3034c 2>/dev/null"
          fi
          echo "============================================================="
          exit 2
          REMOTE_EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              PUBLIC_URL="${PUBLIC_URL}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              PUBLIC_URL="${PUBLIC_URL}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          fi
