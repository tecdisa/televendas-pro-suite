name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'nginx.conf'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '8081' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SSH password helper (if needed)
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          wait_apt_locks() {
            local timeout_seconds="${1:-600}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on GitHub runner."
                return 1
              fi
              echo "Apt lock detected on runner, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          if [ -n "${SSH_PASSWORD:-}" ]; then
            wait_apt_locks 600
            sudo apt-get update -y
            wait_apt_locks 600
            sudo apt-get install -y sshpass
          fi

      - name: Setup SSH authentication
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_HOST:-}" ]; then
            echo "Missing SSH_HOST secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy
            {
              echo "SSH_AUTH_MODE=key"
              echo "SSH_BASE_ARGS=-i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-i ~/.ssh/id_deploy -P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          elif [ -n "${SSH_PASSWORD:-}" ]; then
            {
              echo "SSH_AUTH_MODE=password"
              echo "SSHPASS=${SSH_PASSWORD}"
              echo "SSH_BASE_ARGS=-p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          else
            echo "Missing SSH auth secret. Set SSH_PRIVATE_KEY or SSH_PASSWORD."
            exit 1
          fi

      - name: Preflight SSH check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          fi

      - name: Bootstrap VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          REMOTE_SCRIPT=$(cat <<'EOF'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          wait_apt_locks() {
            local timeout_seconds="${1:-900}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on VPS."
                return 1
              fi
              echo "Apt lock detected on VPS, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          apt_safe() {
            wait_apt_locks 900
            apt-get "$@" -o Dpkg::Lock::Timeout=900
          }

          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi
          if [ "$(id -u)" = "0" ] && command -v apt-get >/dev/null 2>&1; then
            apt_safe update -y
            apt_safe install -y ca-certificates curl git rsync ufw
          fi
          if ! docker compose version >/dev/null 2>&1; then
            install -m 0755 -d /etc/apt/keyrings
            if [ ! -f /etc/apt/keyrings/docker.asc ]; then
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
            fi
            ARCH="$(dpkg --print-architecture)"
            CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
            cat >/etc/apt/sources.list.d/docker.list <<SRC
          deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${CODENAME} stable
          SRC
            apt_safe update -y
            apt_safe install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            systemctl enable --now docker
          fi
          mkdir -p "$DEPLOY_DIR"
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          fi

      - name: Sync files to VPS (rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          # Sync dist/ (built in CI) + config files. No build on the server.
          # Use --exclude=PATTERN form to avoid quoting issues with variable expansion.
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            sshpass -e rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          fi

      - name: Upload .env file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT" > .env.deploy
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          else
            sshpass -e scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          fi
          rm -f .env.deploy

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL || 'https://adsvendas-f.adsapi.com.br' }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          REMOTE_SCRIPT=$(cat <<EOF
          set -euo pipefail

          PUBLIC_URL="${PUBLIC_URL}"

          if [[ "\${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="\$HOME/\${DEPLOY_DIR#~/}"
          fi

          cd "\$DEPLOY_DIR"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif docker-compose --version >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose not found on VPS."
            exit 1
          fi

          # ===========================================================
          # 1. Descobrir o nome do bundle atual (gerado neste build)
          # ===========================================================
          NEW_BUNDLE=\$(ls "\$DEPLOY_DIR/dist/assets/"index-*.js 2>/dev/null | head -1 | xargs -r basename)
          if [ -z "\$NEW_BUNDLE" ]; then
            echo "ERRO: bundle JS nao encontrado em dist/assets/"
            exit 1
          fi
          echo ">>> Bundle desta versao: \$NEW_BUNDLE"

          # ===========================================================
          # 2. Recriar Docker container (porta 8081) com dist/ novo
          # ===========================================================
          docker pull nginx:1.27-alpine >/dev/null
          \$COMPOSE -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
          docker exec tecdisa-frontend nginx -s reload 2>/dev/null || true

          # ===========================================================
          # 3. Procurar TODOS os index.html no servidor que apontam
          #    para um bundle DIFERENTE do nosso atual e atualiza-los.
          #    Isso garante que qualquer webroot servido pelo nginx do
          #    sistema seja descoberto e atualizado, mesmo que esteja
          #    em um caminho que nao conhecemos.
          # ===========================================================
          echo ">>> Procurando webroots que servem versao antiga..."
          UPDATED_DIRS=""
          while IFS= read -r HTML; do
            [ -r "\$HTML" ] || continue
            # Pular htmls que nao tenham padrao de bundle do Vite
            CURRENT_SRC=\$(grep -oE 'src="/assets/index-[^"]+\.js"' "\$HTML" 2>/dev/null | head -1)
            [ -n "\$CURRENT_SRC" ] || continue
            # Se ja aponta pro bundle novo, nada a fazer
            if echo "\$CURRENT_SRC" | grep -q "\$NEW_BUNDLE"; then
              continue
            fi
            DIR=\$(dirname "\$HTML")
            # Pular o nosso proprio DEPLOY_DIR/dist (origem)
            case "\$DIR" in
              "\$DEPLOY_DIR/dist"*) continue ;;
            esac
            echo "    Webroot desatualizado: \$HTML  (aponta para \$CURRENT_SRC)"
            if [ -w "\$DIR" ]; then
              echo "    Atualizando \$DIR via rsync..."
              rsync -a --checksum --delete "\$DEPLOY_DIR/dist/." "\$DIR/"
              UPDATED_DIRS="\$UPDATED_DIRS \$DIR"
            else
              echo "    SEM permissao de escrita em \$DIR (precisa rodar como dono ou via sudo)"
            fi
          done < <(find / -type f -name "index.html" 2>/dev/null)

          # ===========================================================
          # 4. Atualizar /var/www/adsvendas/frontend (caso o find acima nao o tenha pegado por causa de permissoes ou symlinks)
          # ===========================================================
          for KNOWN in /var/www/adsvendas/frontend /var/www/html/adsvendas /var/www/adsvendas-f; do
            if [ -d "\$KNOWN" ] && [ -w "\$KNOWN" ]; then
              case " \$UPDATED_DIRS " in
                *" \$KNOWN "*) ;;
                *)
                  echo ">>> Garantindo atualizacao de webroot conhecido: \$KNOWN"
                  rsync -a --checksum --delete "\$DEPLOY_DIR/dist/." "\$KNOWN/"
                  UPDATED_DIRS="\$UPDATED_DIRS \$KNOWN"
                  ;;
              esac
            fi
          done

          # ===========================================================
          # 5. Reload do nginx do sistema (limpa open_file_cache e
          #    proxy_cache em memoria). Tenta varios metodos.
          # ===========================================================
          echo ">>> Tentando reload do nginx do sistema..."
          RELOAD_OK=0
          if sudo -n nginx -s reload 2>/dev/null; then
            echo "    nginx -s reload via sudo: OK"
            RELOAD_OK=1
          elif sudo -n systemctl reload nginx 2>/dev/null; then
            echo "    systemctl reload nginx via sudo: OK"
            RELOAD_OK=1
          elif sudo -n service nginx reload 2>/dev/null; then
            echo "    service nginx reload via sudo: OK"
            RELOAD_OK=1
          fi

          # Fallback: tentar enviar SIGHUP via /proc se temos permissao
          if [ "\$RELOAD_OK" = "0" ]; then
            NGINX_PIDS=\$(pgrep -f 'nginx: master process' 2>/dev/null | head -3)
            for PID in \$NGINX_PIDS; do
              if kill -HUP "\$PID" 2>/dev/null; then
                echo "    SIGHUP enviado para nginx master PID=\$PID: OK"
                RELOAD_OK=1
                break
              fi
            done
          fi

          if [ "\$RELOAD_OK" = "0" ]; then
            echo "    AVISO: nao foi possivel recarregar o nginx do sistema."
            echo "    Para habilitar reload automatico no futuro, rode como ROOT no servidor:"
            echo "      echo '\$(whoami) ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl reload nginx' | sudo tee /etc/sudoers.d/deploy-nginx"
            echo "      sudo chmod 0440 /etc/sudoers.d/deploy-nginx"
          fi

          # ===========================================================
          # 6. Verificacao final: o site publico esta servindo o bundle novo?
          # ===========================================================
          echo ">>> Verificando \$PUBLIC_URL ..."
          sleep 2
          REMOTE_BUNDLE=\$(curl -fsSL --max-time 10 "\$PUBLIC_URL/" 2>/dev/null | grep -oE 'src="/assets/index-[^"]+\.js"' | head -1 || echo "")
          echo "    URL publica serve: \$REMOTE_BUNDLE"
          echo "    Esperado:          src=\"/assets/\$NEW_BUNDLE\""
          if echo "\$REMOTE_BUNDLE" | grep -q "\$NEW_BUNDLE"; then
            echo "    OK! O site publico esta servindo a versao nova."
          else
            echo "    FALHA: o site publico ainda serve versao antiga."
            echo "    Causa provavel: nginx do sistema NAO foi recarregado (cache de bytes ou open_file_cache)."
            echo "    Solucao imediata: rode no servidor como root:  sudo nginx -s reload"
            exit 2
          fi

          echo ">>> Deploy concluido com sucesso."
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          fi
