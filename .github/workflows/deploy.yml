name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'nginx.conf'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '8081' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SSH password helper (if needed)
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          wait_apt_locks() {
            local timeout_seconds="${1:-600}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on GitHub runner."
                return 1
              fi
              echo "Apt lock detected on runner, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          if [ -n "${SSH_PASSWORD:-}" ]; then
            wait_apt_locks 600
            sudo apt-get update -y
            wait_apt_locks 600
            sudo apt-get install -y sshpass
          fi

      - name: Setup SSH authentication
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -z "${SSH_HOST:-}" ]; then
            echo "Missing SSH_HOST secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
            chmod 600 ~/.ssh/id_deploy
            {
              echo "SSH_AUTH_MODE=key"
              echo "SSH_BASE_ARGS=-i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-i ~/.ssh/id_deploy -P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          elif [ -n "${SSH_PASSWORD:-}" ]; then
            {
              echo "SSH_AUTH_MODE=password"
              echo "SSHPASS=${SSH_PASSWORD}"
              echo "SSH_BASE_ARGS=-p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "SCP_BASE_ARGS=-P ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
              echo "RSYNC_RSH=ssh -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes"
            } >> "$GITHUB_ENV"
          else
            echo "Missing SSH auth secret. Set SSH_PRIVATE_KEY or SSH_PASSWORD."
            exit 1
          fi

      - name: Preflight SSH check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" 'echo ok'
          fi

      - name: Bootstrap VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          REMOTE_SCRIPT=$(cat <<'EOF'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          wait_apt_locks() {
            local timeout_seconds="${1:-900}"
            local waited=0
            while pgrep -x apt >/dev/null 2>&1 \
              || pgrep -x apt-get >/dev/null 2>&1 \
              || pgrep -x unattended-upgrade >/dev/null 2>&1; do
              if [ "$waited" -ge "$timeout_seconds" ]; then
                echo "Timed out waiting for apt lock on VPS."
                return 1
              fi
              echo "Apt lock detected on VPS, waiting..."
              sleep 5
              waited=$((waited + 5))
            done
          }

          apt_safe() {
            wait_apt_locks 900
            apt-get "$@" -o Dpkg::Lock::Timeout=900
          }

          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi
          if [ "$(id -u)" = "0" ] && command -v apt-get >/dev/null 2>&1; then
            apt_safe update -y
            apt_safe install -y ca-certificates curl git rsync ufw
          fi
          if ! docker compose version >/dev/null 2>&1; then
            install -m 0755 -d /etc/apt/keyrings
            if [ ! -f /etc/apt/keyrings/docker.asc ]; then
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
              chmod a+r /etc/apt/keyrings/docker.asc
            fi
            ARCH="$(dpkg --print-architecture)"
            CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
            cat >/etc/apt/sources.list.d/docker.list <<SRC
          deb [arch=${ARCH} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${CODENAME} stable
          SRC
            apt_safe update -y
            apt_safe install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            systemctl enable --now docker
          fi
          mkdir -p "$DEPLOY_DIR"
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" DEPLOY_DIR="${TARGET_DIR}" 'bash -se' <<< "$REMOTE_SCRIPT"
          fi

      - name: Sync files to VPS (rsync)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          # Sync dist/ (built in CI) + config files. No build on the server.
          # Use --exclude=PATTERN form to avoid quoting issues with variable expansion.
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" "mkdir -p ${TARGET_DIR}"
            sshpass -e rsync -avz --checksum --delete \
              --exclude=.git/ \
              --exclude=node_modules/ \
              --exclude=.env \
              --exclude=.env.* \
              -e "$RSYNC_RSH" \
              ./ "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/"
          fi

      - name: Upload .env file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          TARGET_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}"
          printf 'FRONTEND_PORT=%s\n' "$FRONTEND_PORT" > .env.deploy
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          else
            sshpass -e scp $SCP_BASE_ARGS .env.deploy "${TARGET_USER}@${SSH_HOST}:${TARGET_DIR}/.env"
          fi
          rm -f .env.deploy

      - name: Deploy (start or reload nginx)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          REMOTE_SCRIPT=$(cat <<'EOF'
          set -euo pipefail

          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi

          cd "$DEPLOY_DIR"

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif docker-compose --version >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose not found on VPS."
            exit 1
          fi

          # Pull latest nginx image
          docker pull nginx:1.27-alpine

          # Always recreate so volume mounts and config changes take effect
          $COMPOSE -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

          # Reload nginx in-place to pick up any nginx.conf changes (zero downtime)
          docker exec tecdisa-frontend nginx -s reload
          echo "Deploy concluido."
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$REMOTE_SCRIPT"
          fi

      - name: Verify deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          TARGET_USER="${SSH_USER:-root}"
          DIAG_SCRIPT=$(cat <<'EOF'
          set -euo pipefail
          if [[ "${DEPLOY_DIR:-}" == "~/"* ]]; then
            DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
          fi
          echo "=== DEPLOY_DIR: $DEPLOY_DIR ==="
          echo "=== dist/assets/ ==="
          ls -lh "$DEPLOY_DIR/dist/assets/" 2>/dev/null || echo "MISSING: dist/assets/ nao encontrado!"
          echo "=== index.html src tag ==="
          grep -o 'src="[^"]*\.js"' "$DEPLOY_DIR/dist/index.html" 2>/dev/null || echo "MISSING: index.html nao encontrado!"
          echo "=== Containers em execucao ==="
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
          echo "=== Volumes do container frontend ==="
          docker inspect tecdisa-frontend --format '{{range .Mounts}}{{.Source}} -> {{.Destination}}{{"\n"}}{{end}}' 2>/dev/null || echo "Container tecdisa-frontend nao encontrado"
          echo "=== O que nginx serve (index.html) ==="
          docker exec tecdisa-frontend wget -qO- http://localhost/index.html 2>/dev/null | grep -o 'src="[^"]*\.js"' || echo "Falha ao buscar index.html do container"
          echo "=== Botao presente no JS? ==="
          JS_FILE=$(ls "$DEPLOY_DIR/dist/assets/"*.js 2>/dev/null | head -1)
          if [ -n "$JS_FILE" ]; then
            grep -c "Percentual por Divis" "$JS_FILE" && echo "BOTAO ENCONTRADO no bundle" || echo "BOTAO NAO ENCONTRADO no bundle!"
          fi
          echo "=== Nginx do sistema: nginx.conf ==="
          cat /etc/nginx/nginx.conf 2>/dev/null | grep -v "^[[:space:]]*#" | grep -v "^$" || echo "nao encontrado"
          echo "=== Nginx do sistema: conf.d/ ==="
          for f in /etc/nginx/conf.d/*.conf; do echo "--- $f ---"; cat "$f" 2>/dev/null | grep -v "^[[:space:]]*#" | grep -v "^$"; done 2>/dev/null || echo "sem conf.d"
          echo "=== Porta 80 - quem esta escutando ==="
          ss -tlnp 2>/dev/null | grep -E ":80|:443" || netstat -tlnp 2>/dev/null | grep -E ":80|:443" || echo "nao disponivel"
          EOF
          )
          if [ "${SSH_AUTH_MODE}" = "key" ]; then
            ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$DIAG_SCRIPT"
          else
            sshpass -e ssh $SSH_BASE_ARGS "${TARGET_USER}@${SSH_HOST}" \
              DEPLOY_DIR="${DEPLOY_DIR:-~/apps/televendas-pro-suite}" \
              'bash -se' <<< "$DIAG_SCRIPT"
          fi
