services:
  frontend:
    container_name: tecdisa-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-https://adsvendas-b.adsapi.com.br}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped
